<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="#f59e0b" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#3b82f6" opacity="0.1"/>

  <!-- Main content -->
  <g text-anchor="middle">
    <!-- Icon: Regex pattern -->
    <text x="300" y="340" font-size="100" fill="#f59e0b" font-family="monospace" font-weight="bold">.*</text>

    <!-- Tool name -->
    <text x="750" y="280" font-size="64" font-weight="bold" fill="white" font-family="Arial, sans-serif">Regex Tester</text>

    <!-- Tagline -->
    <text x="750" y="370" font-size="28" fill="#94a3b8" font-family="Arial, sans-serif">Free • Private • No Signup</text>

    <!-- Bottom branding -->
    <text x="600" y="600" font-size="18" fill="#64748b" font-family="Arial, sans-serif">cyril-netizen.github.io/toolpailot</text>
  </g>
</svg>
