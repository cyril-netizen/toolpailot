<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#8b5cf6" opacity="0.1"/>

  <!-- Main content -->
  <g text-anchor="middle">
    <!-- Lightning bolt icon -->
    <text x="600" y="180" font-size="100" fill="url(#accentGradient)" font-family="Arial, sans-serif" font-weight="bold">⚡</text>

    <!-- Main title -->
    <text x="600" y="280" font-size="72" font-weight="bold" fill="white" font-family="Arial, sans-serif">Tool Pilot</text>

    <!-- Subtitle -->
    <text x="600" y="350" font-size="36" fill="#94a3b8" font-family="Arial, sans-serif">20 Free Online Tools</text>

    <!-- Tagline -->
    <text x="600" y="410" font-size="28" fill="#cbd5e1" font-family="Arial, sans-serif">Fast • Private • No Signup</text>
  </g>
</svg>
